<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pressed Cafe — Water Program One Pager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --cream:#f5f0e8;
    --cream-dk:#ede6d6;
    --paper:#ffffff;
    --ink:#1a1a18;
    --ink-lt:#3d3d38;
    --ink-mute:#5a574f;
    --coral:#c94f37;
    --coral-lt:#e06b52;
    --tan:#a89772;
    --border:rgba(26,26,24,0.14);
    --border-strong:rgba(26,26,24,0.26);
    /* shelf accents - muted so text is legible */
    --shelf-top:#ead8c6;
    --shelf-prep:#d6dec7;
    --shelf-juice:#f1d6a8;
    --shelf-cans:#c9dcd0;
    --shelf-water:#c4d5e4;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#e6ded1;}
  body{
    font-family:'Source Sans 3',sans-serif;
    color:var(--ink);
    padding:28px 20px 60px;
    min-height:100vh;
    font-size:15px;
    line-height:1.55;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size:200px 200px;pointer-events:none;z-index:0;
  }

  .sheet{
    position:relative;z-index:1;
    max-width:1120px;margin:0 auto;
    background:var(--cream);
    border:1px solid var(--border);
    box-shadow:0 24px 60px rgba(26,26,24,0.14);
    overflow:hidden;
  }

  /* ── Header ── */
  .head{
    display:flex;align-items:stretch;justify-content:space-between;
    background:var(--cream-dk);
    border-bottom:3px solid var(--coral);
    padding:22px 40px;gap:24px;
  }
  .head-left{display:flex;align-items:center;gap:20px;}
  .head-logo{height:58px;width:auto;}
  .head-div{width:1px;background:var(--border);align-self:stretch;}
  .head-kicker{
    font-size:11px;font-weight:700;letter-spacing:0.22em;
    text-transform:uppercase;color:var(--tan);margin-bottom:5px;
    white-space:nowrap;
  }
  .head-title{
    font-family:'Playfair Display',serif;
    font-size:24px;font-weight:900;color:var(--ink);line-height:1;
  }
  .head-right{text-align:right;display:flex;flex-direction:column;justify-content:center;gap:7px;flex-shrink:0;}
  .head-pill{
    display:inline-flex;align-items:center;gap:7px;
    font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--coral);background:rgba(201,79,55,0.08);
    border:1px solid rgba(201,79,55,0.22);
    border-radius:20px;padding:5px 13px;align-self:flex-end;
    white-space:nowrap;flex-shrink:0;
  }
  .head-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--coral);flex-shrink:0;}
  .head-meta{font-size:12px;color:var(--ink-mute);letter-spacing:0.06em;white-space:nowrap;}

  /* ── Hero ── */
  .hero{
    padding:34px 40px 24px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:32px;
    border-bottom:1px solid var(--border);
  }
  .hero-title{
    font-family:'Playfair Display',serif;
    font-size:52px;font-weight:900;line-height:0.98;color:var(--ink);
    letter-spacing:-0.01em;
  }
  .hero-title em{font-style:italic;color:var(--coral);font-weight:700;}
  .hero-lede{
    font-size:16px;line-height:1.6;color:var(--ink-lt);font-weight:400;
    max-width:400px;
  }

  /* ── Section rule ── */
  .rule{
    display:flex;align-items:center;gap:16px;
    padding:30px 40px 14px;
  }
  .rule-num{
    font-family:'Playfair Display',serif;
    font-size:15px;font-weight:900;color:var(--coral);
    width:30px;height:30px;border-radius:50%;
    border:1.5px solid var(--coral);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .rule-label{
    font-size:13px;font-weight:700;letter-spacing:0.2em;
    text-transform:uppercase;color:var(--ink);white-space:nowrap;
  }
  .rule-line{flex:1;height:1px;background:var(--border);}

  /* ── SKU grid ── */
  .sku-intro{
    padding:0 40px 18px;
    font-size:15px;color:var(--ink-lt);line-height:1.6;
    max-width:900px;
  }
  .sku-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:12px;
    padding:0 40px 32px;
  }
  .sku{
    background:var(--paper);
    border:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;position:relative;
    border-radius:4px;
  }
  .sku-img{
    background:#fafafa;aspect-ratio:3/4;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .sku-img img{width:100%;height:100%;object-fit:contain;object-position:center;}
  .sku-body{padding:10px 10px 11px;border-top:1px solid var(--border);}
  .sku-name{
    font-family:'Playfair Display',serif;
    font-size:13px;font-weight:700;color:var(--ink);line-height:1.18;margin-bottom:4px;
  }
  .sku-meta{
    font-size:10.5px;font-weight:600;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--tan);
  }
  .sku-type{
    position:absolute;top:8px;left:8px;
    font-size:9.5px;font-weight:700;letter-spacing:0.12em;
    text-transform:uppercase;padding:3px 7px;border-radius:3px;
    background:rgba(255,255,255,0.94);border:1px solid var(--border);
    color:var(--ink-lt);
  }
  .sku-type.new{background:var(--coral);color:#fff;border-color:var(--coral);}

  /* ── Planogram section ── */
  .plan-wrap{padding:6px 40px 32px;}
  .plan-note{
    font-size:15px;color:var(--ink-lt);line-height:1.6;
    max-width:900px;margin-bottom:22px;
  }

  .plan-layout{
    display:grid;
    grid-template-columns:1.15fr 1fr;
    gap:22px;
    align-items:start;
    break-inside:avoid;
    page-break-inside:avoid;
  }
  .plan-layout.stacked{grid-template-columns:1fr;}

  /* Clean planogram diagram */
  .cooler{
    background:#fafaf7;
    border:2px solid var(--ink);
    border-radius:8px;
    padding:14px;
    position:relative;
  }
  .cooler-top{
    background:var(--ink);
    border-radius:4px;
    padding:10px 14px;
    margin:-4px -4px 12px;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .cooler-top-mark{
    width:18px;height:18px;border-radius:50%;
    background:var(--coral);display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:900;font-size:11px;
  }
  .cooler-top-title{
    font-family:'Playfair Display',serif;
    font-size:15px;font-weight:700;color:#fff;letter-spacing:0.08em;text-transform:uppercase;
    white-space:nowrap;
  }

  .door-heads{
    display:grid;
    grid-template-columns:var(--door-cols,1fr 1fr 1fr);
    gap:6px;margin-bottom:8px;padding:0 2px;
  }
  .door-head{
    text-align:center;
    font-size:12px;font-weight:700;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--ink-mute);
    padding:4px 0;
  }

  .shelves{
    display:flex;flex-direction:column;gap:6px;
  }
  .shelf-row{
    display:grid;
    grid-template-columns:78px 1fr 64px;
    gap:8px;align-items:stretch;
  }
  .shelf-pos-left,.shelf-pos-right{
    display:flex;align-items:center;
    font-size:11px;font-weight:700;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--ink-mute);
    line-height:1.1;
  }
  .shelf-pos-left{justify-content:flex-end;text-align:right;}
  .shelf-pos-right{justify-content:flex-start;}
  .shelf-pos-left strong,.shelf-pos-right strong{
    display:block;color:var(--ink);font-size:14px;
    font-family:'Playfair Display',serif;letter-spacing:0;text-transform:none;
    font-weight:700;margin-bottom:1px;
  }

  .shelf{
    border-radius:4px;
    padding:13px 16px;
    border:1px solid rgba(0,0,0,0.1);
    display:flex;flex-direction:column;justify-content:center;gap:3px;
    min-height:72px;
  }
  .shelf.top{background:var(--shelf-top);}
  .shelf.prep{background:var(--shelf-prep);}
  .shelf.juice{background:var(--shelf-juice);border:2px solid #b67d2a;}
  .shelf.cans{background:var(--shelf-cans);}
  .shelf.water{background:var(--shelf-water);}
  .shelf-title{
    font-family:'Playfair Display',serif;
    font-size:16px;font-weight:700;color:var(--ink);
    display:flex;align-items:center;gap:7px;line-height:1.15;
  }
  .shelf-title .star{color:var(--coral);font-size:15px;}
  .shelf-items{
    font-size:13px;color:var(--ink-lt);line-height:1.45;font-weight:400;
  }
  .shelf-items b{font-weight:600;color:var(--ink);}

  /* Water row column detail */
  .water-shelf{padding-top:10px;padding-bottom:10px;}
  .water-cols{
    display:grid;
    grid-template-columns:var(--door-cols,1fr 1fr 1fr);
    gap:6px;margin-top:8px;
  }
  .water-col{
    background:rgba(255,255,255,0.6);
    border:1px solid rgba(26,26,24,0.12);
    border-radius:3px;
    padding:7px 9px;
    font-size:12px;line-height:1.35;
  }
  .water-col-door{
    font-size:10px;font-weight:700;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--ink-mute);margin-bottom:3px;
  }
  .water-col-skus{color:var(--ink);font-weight:500;}

  /* Salem photo callout */
  .photo-card{
    background:var(--paper);
    border:1px solid var(--border);
    border-radius:6px;overflow:hidden;
    display:flex;flex-direction:column;
    break-inside:avoid;
    page-break-inside:avoid;
  }
  .photo-card img{width:100%;height:auto;display:block;}
  .photo-cap{
    padding:12px 16px 14px;
    border-top:1px solid var(--border);
  }
  .photo-cap-tag{
    font-size:10.5px;font-weight:700;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--coral);margin-bottom:4px;
  }
  .photo-cap-title{
    font-family:'Playfair Display',serif;
    font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px;line-height:1.2;
  }
  .photo-cap-desc{
    font-size:13px;color:var(--ink-lt);line-height:1.5;
  }

  /* ── Rules ── */
  .rules{padding:4px 40px 28px;}
  .rules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .rule-card{
    background:var(--paper);
    border:1px solid var(--border);
    border-top:3px solid var(--coral);
    padding:18px 20px 16px;border-radius:0 0 4px 4px;
  }
  .rule-card-num{
    font-family:'Playfair Display',serif;
    font-size:12px;font-weight:700;color:var(--coral);
    letter-spacing:0.18em;text-transform:uppercase;margin-bottom:7px;
  }
  .rule-card-title{
    font-family:'Playfair Display',serif;
    font-size:17px;font-weight:700;color:var(--ink);line-height:1.25;margin-bottom:8px;
  }
  .rule-card-desc{
    font-size:13.5px;color:var(--ink-lt);line-height:1.55;font-weight:400;
  }

  /* ── Do / Don't ── */
  .dos{padding:0 40px 32px;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:stretch;}
  .do-card{
    background:var(--paper);border:1px solid var(--border);
    padding:18px 20px 18px;position:relative;border-radius:4px;
    display:flex;flex-direction:column;
  }
  .do-card.good{border-left:4px solid #4a7a4a;}
  .do-card.bad{border-left:4px solid var(--coral);}
  .do-head{
    display:flex;align-items:center;gap:9px;
    font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
    margin-bottom:12px;
  }
  .do-head.good{color:#4a7a4a;}
  .do-head.bad{color:var(--coral);}
  .do-icon{
    width:22px;height:22px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:900;color:#fff;line-height:1;
  }
  .do-icon.good{background:#4a7a4a;}
  .do-icon.bad{background:var(--coral);}
  .do-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:9px;flex:1;}
  .do-list li{
    font-size:13.5px;color:var(--ink-lt);line-height:1.5;
    padding-left:16px;position:relative;
    flex-shrink:0;
  }
  .do-list li::before{
    content:'';position:absolute;left:0;top:10px;
    width:7px;height:1.5px;background:var(--border-strong);
  }
  .do-list li b{color:var(--ink);font-weight:600;}

  /* ── Footer ── */
  .foot{
    background:var(--ink);
    padding:16px 40px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .foot-left{
    font-size:11px;font-weight:700;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--tan);white-space:nowrap;
  }
  .foot-left span{color:var(--coral);}
  .foot-right{
    font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.08em;white-space:nowrap;
  }

  @media (max-width:880px){
    .sku-grid{grid-template-columns:repeat(3,1fr);}
    .rules-grid{grid-template-columns:1fr;}
    .dos{grid-template-columns:1fr;}
    .plan-layout{grid-template-columns:1fr;}
    .hero{flex-direction:column;align-items:flex-start;}
    .hero-title{font-size:36px;}
    .shelf-row{grid-template-columns:60px 1fr;}
    .shelf-pos-right{display:none;}
  }
</style>
</head>
<body>

<div id="root"></div>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

            <li><b>Don't mix flavors in a column</b> — one SKU top to bottom.</li>
            <li><b>Don't stock prepared foods</b> on the top shelf — High shelf only.</li>
            <li><b>Don't leave Poland Spring 25 oz</b> on the side rack.</li>
            <li><b>Don't use handwritten shelf labels</b> — printed cards only.</li>
          </ul>
        </div>
      </div>

      {/* Footer */}
      <div className="foot">
        <div className="foot-left">Pressed Cafe · <span>Water Program Reset</span> · Internal Use Only</div>
        <div className="foot-right">Questions? Contact your District Manager.</div>
      </div>
    </div>

    <TweaksPanel title="Tweaks">
      <TweakSection label="Cooler layout" />
      <TweakRadio
        label="Cooler type"
        value={t.coolerType}
        options={['3-door','2-door']}
        onChange={(v)=>setTweak('coolerType', v)}
      />
      <TweakToggle
        label="Show Salem store reference photo"
        value={t.showSalemPhoto}
        onChange={(v)=>setTweak('showSalemPhoto', v)}
      />

      <TweakSection label="Content" />
      <TweakToggle
        label="Show New / Core badges"
        value={t.showNewBadges}
        onChange={(v)=>setTweak('showNewBadges', v)}
      />
      <TweakRadio
        label="Planogram density"
        value={t.density}
        options={['compact','comfortable','airy']}
        onChange={(v)=>setTweak('density', v)}
      />
      <TweakSlider
        label="Body font size"
        value={t.bodyFontSize}
        min={13} max={18} step={1} unit="px"
        onChange={(v)=>setTweak('bodyFontSize', v)}
      />
    </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
